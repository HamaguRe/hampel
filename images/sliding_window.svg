<svg width="700" height="250" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250">
  <rect width="700" height="250" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" fill="#222" font-size="13" font-weight="bold" font-family="sans-serif">Sliding Window  (size = 5)</text>

  <!-- X axis -->
  <line x1="30" y1="190" x2="672" y2="190" stroke="#ccc" stroke-width="1"/>
  <text x="676" y="194" fill="#aaa" font-size="11" font-family="sans-serif">t</text>

  <!-- Tick marks -->
  <line x1="60"  y1="186" x2="60"  y2="194" stroke="#ccc" stroke-width="1"/>
  <line x1="120" y1="186" x2="120" y2="194" stroke="#ccc" stroke-width="1"/>
  <line x1="180" y1="186" x2="180" y2="194" stroke="#ccc" stroke-width="1"/>
  <line x1="240" y1="186" x2="240" y2="194" stroke="#ccc" stroke-width="1"/>
  <line x1="300" y1="186" x2="300" y2="194" stroke="#ccc" stroke-width="1"/>
  <line x1="360" y1="186" x2="360" y2="194" stroke="#ccc" stroke-width="1"/>
  <line x1="420" y1="186" x2="420" y2="194" stroke="#ccc" stroke-width="1"/>
  <line x1="480" y1="186" x2="480" y2="194" stroke="#ccc" stroke-width="1"/>
  <line x1="540" y1="186" x2="540" y2="194" stroke="#ccc" stroke-width="1"/>
  <line x1="600" y1="186" x2="600" y2="194" stroke="#ccc" stroke-width="1"/>
  <line x1="660" y1="186" x2="660" y2="194" stroke="#ccc" stroke-width="1"/>

  <!-- Window highlight -->
  <rect x="219" y="48" width="262" height="148" rx="5" fill="#ebf4fd" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="350" y="43" text-anchor="middle" fill="#4a90d9" font-size="11" font-weight="bold" font-family="sans-serif">window</text>

  <!-- Median line (inside window only) -->
  <line x1="220" y1="140" x2="480" y2="140" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="488" y="144" fill="#27ae60" font-size="10" font-family="sans-serif">median</text>

  <!-- Threshold lines (inside window only) -->
  <line x1="220" y1="98"  x2="480" y2="98"  stroke="#e67e22" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="220" y1="182" x2="480" y2="182" stroke="#e67e22" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="488" y="102" fill="#e67e22" font-size="10" font-family="sans-serif">+k&#x3C3;&#x302;</text>
  <text x="488" y="186" fill="#e67e22" font-size="10" font-family="sans-serif">&#x2212;k&#x3C3;&#x302;</text>

  <!-- Data points outside window (left, gray) -->
  <circle cx="60"  cy="143" r="5" fill="#c0c0c0"/>
  <circle cx="120" cy="136" r="5" fill="#c0c0c0"/>
  <circle cx="180" cy="145" r="5" fill="#c0c0c0"/>

  <!-- Data points inside window (blue) -->
  <circle cx="240" cy="138" r="5" fill="#4a90d9"/>
  <circle cx="300" cy="133" r="5" fill="#4a90d9"/>

  <!-- Outlier input (red) -->
  <circle cx="360" cy="64"  r="6" fill="#e74c3c" stroke="white" stroke-width="1.5"/>
  <text x="368" y="60" fill="#e74c3c" font-size="10" font-family="sans-serif">outlier</text>
  <!-- Dashed arrow from outlier down to replaced value -->
  <line x1="360" y1="71" x2="360" y2="124" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3 2"/>
  <polygon points="360,134 355,124 365,124" fill="#e74c3c"/>

  <!-- Replaced value (green, at median) -->
  <circle cx="360" cy="140" r="6" fill="#27ae60" stroke="white" stroke-width="1.5"/>
  <text x="368" y="155" fill="#27ae60" font-size="10" font-family="sans-serif">replaced</text>

  <!-- Data points inside window (blue) -->
  <circle cx="420" cy="135" r="5" fill="#4a90d9"/>
  <circle cx="480" cy="130" r="5" fill="#4a90d9"/>

  <!-- Data points outside window (right, gray) -->
  <circle cx="540" cy="141" r="5" fill="#c0c0c0"/>
  <circle cx="600" cy="137" r="5" fill="#c0c0c0"/>
  <circle cx="660" cy="139" r="5" fill="#c0c0c0"/>

  <!-- Legend -->
  <circle cx="220" cy="220" r="5" fill="#4a90d9"/>
  <text x="232" y="224" fill="#444" font-size="11" font-family="sans-serif">in-window value</text>
  <circle cx="350" cy="220" r="5" fill="#e74c3c"/>
  <text x="362" y="224" fill="#444" font-size="11" font-family="sans-serif">outlier (input)</text>
  <circle cx="480" cy="220" r="5" fill="#27ae60"/>
  <text x="492" y="224" fill="#444" font-size="11" font-family="sans-serif">replaced output</text>
</svg>
